services:
  web:
    build: .
    container_name: portal_web
    ports:
      - "3000:80"
    environment:
      DB_HOST: db
      DB_NAME: portal_db
      DB_USER: root
      DB_PASS: root
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: portal_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: portal_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./portal_db.sql:/docker-entrypoint-initdb.d/portal_db.sql

volumes:
  db_data: